<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart PG Finder | Contact Us</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <header>

        <div class="logo">
            <i class="fa-solid fa-house"></i>
            <h2>Smart PG Finder</h2>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="cities.html">Cities</a></li>
                <li><a href="listings.html">PG Listings</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

        <a href="#" class="login-btn">Login</a>

    </header>

    <section class="contact-section">

        <div class="contact-info">

            <h1>Contact Us</h1>

            <p>
                Find the perfect PG accommodation across Tamil Nadu.
                Contact us for support and inquiries.
            </p>

            <h3>
                <i class="fa-solid fa-location-dot"></i>
                Coimbatore, Tamil Nadu
            </h3>

            <h3>
                <i class="fa-solid fa-phone"></i>
                +91 9876543210
            </h3>

            <h3>
                <i class="fa-solid fa-envelope"></i>
                smartpg@gmail.com
            </h3>

        </div>

        <div class="contact-form">

            <form>

                <input
                    type="text"
                    placeholder="Enter your name"
                    required>

                <input
                    type="email"
                    placeholder="Enter your email"
                    required>

                <textarea
                    placeholder="Enter your message"
                    rows="5"
                    required>
                </textarea>

                <button type="submit">
                    Send Message
                </button>

            </form>

        </div>

    </section>

    <footer>

        <h3>Smart PG Finder</h3>

        <p>
            © 2026 Smart PG Finder.
            All Rights Reserved.
        </p>

        <div class="social">
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-twitter"></i>
            <i class="fa-brands fa-linkedin"></i>
        </div>

    </footer>

</body>

</html>
